<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

/* HEADER */
.header {
  background: #007BFF;
  color: white;
  padding: 15px;
  text-align: center;
}

/* CONTAINER */
.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

/* SEARCH */
.search-box {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

tr:hover {
  background: #f1f1f1;
  cursor: pointer;
}

/* CARD VIEW (MOBILE) */
.card {
  display: none;
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
}

/* BUTTONS */
.btn {
  padding: 6px 10px;
  border: none;
  cursor: pointer;
  margin-right: 5px;
}

.edit { background: orange; color: white; }
.delete { background: red; color: white; }

/* SPINNER */
.overlay {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(255,255,255,0.7);
  justify-content:center;
  align-items:center;
}

.spinner {
  width:50px;height:50px;
  border:5px solid #007BFF;
  border-top:5px solid transparent;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg);}}

/* TOAST */
.toast {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:green;
  color:white;
  padding:10px 20px;
  display:none;
}

/* MOBILE */
@media(max-width:600px){
  table { display:none; }
  .card { display:block; }
}
</style>
</head>

<body>

<div class="header">📊 Admin Dashboard</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
</div>

<div class="container">

<input class="search-box" id="search" placeholder="Search...">

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Message</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div id="cardContainer"></div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbykrp3v7aWou1xihbvHrEgE9LOO_FPQZS_GUlRCfsVux1ck4I2knz9hXIftHxy4LuWyvA/exec";

const tableBody = document.getElementById("tableBody");
const cardContainer = document.getElementById("cardContainer");
const overlay = document.getElementById("overlay");
const toast = document.getElementById("toast");
const search = document.getElementById("search");

let allData = [];

function loadData() {
  overlay.style.display = "flex";

  fetch(URL)
    .then(res => res.json())
    .then(data => {
      allData = data.slice(1);
      render(allData);
    })
    .finally(() => overlay.style.display = "none");
}

function render(data) {
  tableBody.innerHTML = "";
  cardContainer.innerHTML = "";

  data.forEach(row => {

    // TABLE
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[3]}</td>
      <td>
        <button class="btn edit" onclick="edit('${row[0]}')">Edit</button>
        <button class="btn delete" onclick="remove('${row[0]}')">Delete</button>
      </td>
    `;
    tableBody.appendChild(tr);

    // CARD (MOBILE)
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <b>${row[1]}</b><br>
      ${row[2]}<br>
      ${row[3]}<br><br>
      <button class="btn edit" onclick="edit('${row[0]}')">Edit</button>
      <button class="btn delete" onclick="remove('${row[0]}')">Delete</button>
    `;
    cardContainer.appendChild(card);
  });
}

/* SEARCH */
search.addEventListener("input", function(){
  const value = this.value.toLowerCase();

  const filtered = allData.filter(row =>
    row.join(" ").toLowerCase().includes(value)
  );

  render(filtered);
});

/* DELETE */
function remove(id) {
  if (!confirm("Delete this record?")) return;

  send({ action:"delete", id });
}

/* EDIT (simple alert demo) */
function edit(id) {
  const row = allData.find(r => r[0] == id);

  const name = prompt("Name", row[1]);
  const email = prompt("Email", row[2]);
  const message = prompt("Message", row[3]);

  if (!name) return;

  send({
    action:"update",
    id,
    name,
    email,
    message
  });
}

/* SEND */
function send(data){
  overlay.style.display="flex";

  fetch(URL,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(()=>{
    showToast("Success!");
    loadData();
  })
  .catch(()=>showToast("Error!",true))
  .finally(()=>overlay.style.display="none");
}

/* TOAST */
function showToast(msg, err=false){
  toast.innerText = msg;
  toast.style.background = err ? "red" : "green";
  toast.style.display="block";

  setTimeout(()=>toast.style.display="none",3000);
}

loadData();
</script>

</body>
</html>
